# Single-host Compose for this deployment.
# Aligns with config.toml: Telegram only, HTTP 62080, no outbound proxy sidecar.
# Secrets via files under ./secrets (not env values). Reverse TLS for
# https://ytdl.oh4ma.net is expected in front of host port 62080.

services:
  # Named volumes are root-owned on first create; app runs as uid 10001.
  volume-init:
    image: alpine:3.20
    user: "0:0"
    volumes:
      - bot-state:/var/lib/ytdlp-bot/state
      - bot-artifacts:/var/lib/ytdlp-bot/artifacts
    command:
      - sh
      - -c
      - |
        mkdir -p /var/lib/ytdlp-bot/state /var/lib/ytdlp-bot/artifacts
        chown -R 10001:10001 /var/lib/ytdlp-bot/state /var/lib/ytdlp-bot/artifacts
    restart: "no"

  ytdlp-bot:
    build: .
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./config.toml:/config/config.toml:ro
      - bot-state:/var/lib/ytdlp-bot/state
      - bot-artifacts:/var/lib/ytdlp-bot/artifacts
      - ./secrets:/run/secrets:ro
    # Matches config [http] bind_port = 62080
    ports:
      - "62080:62080"
    depends_on:
      volume-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # outbound_proxy_ref is disabled in config.toml; do not set YTDLP_BOT_OUTBOUND_PROXY.
    # Optional: pin a Docker network whose CIDR matches [http] trusted_proxy_networks
    # when a reverse proxy sits on the same bridge.

volumes:
  bot-state:
  bot-artifacts:
