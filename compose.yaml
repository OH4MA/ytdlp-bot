# Single-host Compose topology (illustrative). Secrets via files, not env values.
services:
  ytdlp-bot:
    build: .
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./config.example.toml:/config/config.toml:ro
      - bot-state:/var/lib/ytdlp-bot/state
      - bot-artifacts:/var/lib/ytdlp-bot/artifacts
      - ./secrets:/run/secrets:ro
    environment:
      YTDLP_BOT_OUTBOUND_PROXY: http://egress-proxy:8888
    ports:
      - "8080:8080"
    depends_on:
      - egress-proxy
    restart: unless-stopped

  egress-proxy:
    # Placeholder controlled-egress sidecar; replace with production proxy image.
    image: alpine:3.20
    command: ["sleep", "infinity"]
    read_only: true
    restart: unless-stopped

volumes:
  bot-state:
  bot-artifacts:
